<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我們的專屬回憶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; opacity: 0; transform: translateY(15px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
    </style>
</head>
<div class="bg-gradient-to-br from-pink-100 to-rose-100 p-4 rounded-full text-pink-500 shadow-inner"><i class="fa-solid fa-heart fa-2x"></i></div>

    <div class="max-w-lg mx-auto p-5 pt-12 pb-20" id="app-container">
        
        <!-- 登入與註冊區塊 -->
        <div id="auth-section" class="glass-card rounded-3xl shadow-xl p-8 mb-6 mt-10">
            <div class="text-center mb-8">
                <div class="inline-block bg-pink-100 p-4 rounded-full text-pink-500 mb-3 shadow-inner"><i class="fa-solid fa-heart fa-2x animate-pulse"></i></div>
                <h1 class="text-3xl font-bold text-gray-800" id="auth-title">登入</h1>
            </div>
            <form id="auth-form" class="space-y-5">
                <div class="relative"><i class="fa-solid fa-user absolute left-4 top-3.5 text-pink-300"></i><input type="text" id="username" placeholder="你的帳號" autocapitalize="none" autocomplete="off" class="pl-11 w-full rounded-2xl border-0 bg-white/80 shadow-sm p-3 focus:ring-2 focus:ring-pink-400 outline-none" required></div>
                <div class="relative"><i class="fa-solid fa-lock absolute left-4 top-3.5 text-pink-300"></i><input type="password" id="password" placeholder="密碼" class="pl-11 w-full rounded-2xl border-0 bg-white/80 shadow-sm p-3 focus:ring-2 focus:ring-pink-400 outline-none" required></div>
                <div id="confirm-password-group" class="hidden relative fade-in"><i class="fa-solid fa-shield-check absolute left-4 top-3.5 text-pink-300"></i><input type="password" id="confirm-password" placeholder="請再次輸入密碼確認" class="pl-11 w-full rounded-2xl border-0 bg-white/80 shadow-sm p-3 focus:ring-2 focus:ring-pink-400 outline-none"></div>
                <button type="submit" class="w-full bg-gradient-to-r from-pink-400 to-rose-400 text-white font-bold py-3 px-4 rounded-2xl shadow-lg hover:-translate-y-0.5 transition-all">確認送出</button>
            </form>
            <div class="mt-6 text-center border-t border-pink-100 pt-4"><button id="toggle-auth" class="text-pink-500 hover:text-pink-700 text-sm font-medium"><i class="fa-solid fa-user-plus mr-1"></i> 還沒有帳號？點此註冊</button></div>
        </div>

        <!-- 主畫面區塊 -->
        <div id="main-section" class="hidden fade-in">
            <!-- 導航列 -->
            <div class="flex justify-between items-center mb-6 glass-card py-3 px-5 rounded-2xl shadow-sm">
                <h1 class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-500"><i class="fa-solid fa-book-open mr-2 text-pink-500"></i>回憶時光機</h1>
                <div class="space-x-2">
                    <button onclick="openLinkModal()" class="text-sm bg-pink-100 text-pink-600 hover:bg-pink-200 py-1.5 px-3 rounded-full shadow-sm font-bold transition-all"><i class="fa-solid fa-link"></i> 綁定</button>
                    <button onclick="logout()" class="text-sm bg-white/50 text-gray-600 hover:bg-white py-1.5 px-3 rounded-full shadow-sm"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>

<!-- 【新增】兩人專屬儀表板 -->
            <div class="glass-card rounded-3xl shadow-md p-5 mb-8 border border-white/60 relative overflow-hidden">
                <button onclick="openRoomSettings()" class="absolute top-3 right-4 text-pink-200 hover:text-pink-500 transition-colors z-10" title="設定紀念日"><i class="fa-solid fa-gear fa-lg"></i></button>
                
                <!-- 使用 w-fit mx-auto 讓區塊在手機版能完美靠左對齊，同時整體畫面居中 -->
                <div class="flex flex-col md:flex-row justify-between w-fit md:w-full mx-auto md:mx-0 gap-4 md:gap-0 pt-2 pb-1">
                    
                    <!-- 項目一：天數 -->
                    <div class="flex items-center gap-4 justify-start">
                        <!-- 固定圓形寬高 w-14 h-14 確保上下圖示絕對對齊 -->
                        <div class="bg-gradient-to-br from-pink-100 to-rose-100 w-14 h-14 rounded-full text-pink-500 shadow-inner flex items-center justify-center shrink-0">
                            <i class="fa-solid fa-calendar-check text-2xl"></i>
                        </div>
                        <div>
                            <p class="text-xs text-gray-500 font-bold tracking-wide">認識 / 在一起</p>
                            <p class="text-3xl font-black text-pink-600 drop-shadow-sm"><span id="days-count">--</span> <span class="text-sm text-pink-400 font-medium">天</span></p>
                        </div>
                    </div>
                    
                    <div class="w-full h-px bg-pink-100 md:hidden"></div> <!-- 手機版分隔線 -->

                    <!-- 項目二：見面次數 -->
                    <div class="flex items-center gap-4 justify-start md:justify-end">
                        <!-- 固定圓形寬高 w-14 h-14 確保上下圖示絕對對齊 -->
                        <div class="bg-gradient-to-br from-purple-100 to-indigo-100 w-14 h-14 rounded-full text-purple-500 shadow-inner flex items-center justify-center shrink-0">
                            <i class="fa-solid fa-face-smile-wink text-2xl"></i>
                        </div>
                        <div>
                            <p class="text-xs text-gray-500 font-bold tracking-wide">我們見面了</p>
                            <div class="flex items-center gap-3">
                                <p class="text-3xl font-black text-purple-600 drop-shadow-sm"><span id="meetup-count">--</span> <span class="text-sm text-purple-400 font-medium">次</span></p>
                                <button onclick="addMeetup()" class="bg-purple-500 hover:bg-purple-600 text-white w-7 h-7 rounded-full flex items-center justify-center font-bold shadow-md transition-transform hover:scale-110" title="見面次數 +1"><i class="fa-solid fa-plus text-xs"></i></button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- 新增紀錄表單 -->
            <div class="glass-card rounded-3xl shadow-md p-6 mb-8 border border-white/60">
                <h2 class="text-lg font-bold mb-4 text-gray-700"><i class="fa-solid fa-plus text-pink-400 mr-2"></i>寫下新回憶</h2>
                <form id="memory-form" class="space-y-4">
                    <input type="date" id="mem-date" class="block w-full rounded-xl border-0 bg-white/90 shadow-inner p-3 text-gray-600 focus:ring-2 focus:ring-pink-300 outline-none" required>
                    <textarea id="mem-content" rows="3" class="block w-full rounded-xl border-0 bg-white/90 shadow-inner p-3 text-gray-700 focus:ring-2 focus:ring-pink-300 outline-none resize-none" placeholder="今天發生了什麼有趣的事？..." required></textarea>
                    <button type="submit" class="w-full bg-gradient-to-r from-purple-400 to-pink-400 text-white font-bold py-2.5 px-4 rounded-xl shadow-md transition-all">保存這一天</button>
                </form>
            </div>

            <!-- 時間軸 -->
            <div class="pl-2"><div id="timeline" class="relative border-l-2 border-pink-200 ml-3 md:ml-4 space-y-8 pb-10"></div></div>
        </div>
    </div>

    <!-- 綁定視窗 (不變) -->
    <div id="link-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 transition-opacity"><div class="glass-card bg-white/90 w-full max-w-sm rounded-3xl p-6 shadow-2xl transform scale-95 transition-transform" id="link-modal-content"><h3 class="text-xl font-bold mb-4 text-center text-pink-600"><i class="fa-solid fa-user-group mr-2"></i>綁定另一半</h3><div class="mb-6 bg-pink-50 p-4 rounded-2xl text-center border border-pink-100"><p class="text-sm text-gray-600 mb-2">你的專屬代碼：</p><div id="my-link-code" class="text-3xl font-mono font-bold text-pink-500 tracking-widest mb-3">------</div><button onclick="generateLinkCode()" class="text-xs bg-pink-200 hover:bg-pink-300 text-pink-800 py-1.5 px-4 rounded-full shadow-sm"><i class="fa-solid fa-rotate mr-1"></i>產生代碼</button></div><div class="mb-2"><p class="text-sm text-gray-600 mb-2">或輸入對方代碼：</p><div class="flex gap-2"><input type="text" id="partner-code" placeholder="請輸入6碼" maxlength="6" class="uppercase text-center font-mono font-bold text-lg flex-1 rounded-xl border border-pink-200 p-2 outline-none focus:ring-2 focus:ring-pink-400 bg-white"><button onclick="joinLinkCode()" class="bg-pink-500 hover:bg-pink-600 text-white px-5 py-2 rounded-xl font-bold shadow-md">綁定</button></div></div><button onclick="closeLinkModal()" class="w-full text-gray-400 hover:text-gray-600 text-sm mt-4 p-2">關閉視窗</button></div></div>
    <!-- 修改紀錄視窗 (不變) -->
    <div id="edit-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 transition-opacity"><div class="glass-card bg-white/90 w-full max-w-sm rounded-3xl p-6 shadow-2xl transform scale-95 transition-transform" id="edit-modal-content"><h3 class="text-xl font-bold mb-4 text-pink-600"><i class="fa-solid fa-pen-to-square mr-2"></i>修改回憶</h3><form id="edit-memory-form" class="space-y-4"><input type="date" id="edit-mem-date" class="block w-full rounded-xl border border-pink-200 bg-white shadow-inner p-3 text-gray-600 outline-none" required><textarea id="edit-mem-content" rows="4" class="block w-full rounded-xl border border-pink-200 bg-white shadow-inner p-3 text-gray-700 outline-none resize-none" required></textarea><div class="flex gap-3 pt-2"><button type="button" onclick="closeEditModal()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2.5 rounded-xl transition-all">取消</button><button type="submit" class="flex-1 bg-gradient-to-r from-purple-400 to-pink-400 text-white font-bold py-2.5 rounded-xl shadow-md transition-all">儲存修改</button></div></form></div></div>

    <!-- 【新增】儀表板設定視窗 -->
    <div id="room-settings-modal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="glass-card bg-white/90 w-full max-w-sm rounded-3xl p-6 shadow-2xl transform scale-95 transition-transform duration-300" id="room-settings-modal-content">
            <h3 class="text-xl font-bold mb-4 text-pink-600"><i class="fa-solid fa-heart mr-2"></i>設定專屬資料</h3>
            <form id="room-settings-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">設定紀念日 / 認識日</label>
                    <input type="date" id="setting-start-date" class="block w-full rounded-xl border border-pink-200 bg-white shadow-inner p-3 text-gray-600 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">手動修改見面次數</label>
                    <input type="number" id="setting-meetup-count" class="block w-full rounded-xl border border-pink-200 bg-white shadow-inner p-3 text-gray-600 outline-none" min="0">
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="closeRoomSettings()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-2.5 rounded-xl transition-all">取消</button>
                    <button type="submit" class="flex-1 bg-gradient-to-r from-pink-400 to-rose-400 text-white font-bold py-2.5 rounded-xl shadow-md transition-all">儲存設定</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let isLogin = true;
        let token = localStorage.getItem('token');
        let currentMemories = []; 
        let editingMemoryId = null; 
        
        // 用來存放儀表板資料的變數
        let roomStartDate = null;
        let roomMeetupCount = 0;

        if (token) { showMain(); fetchMemories(); fetchRoomInfo(); }

        // --- 登入與註冊 ---
        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? '登入' : '註冊新帳號';
            document.getElementById('toggle-auth').innerHTML = isLogin ? '<i class="fa-solid fa-user-plus mr-1"></i> 還沒有帳號？點此註冊' : '<i class="fa-solid fa-arrow-left mr-1"></i> 已有帳號？返回登入';
            const confirmGroup = document.getElementById('confirm-password-group');
            const confirmInput = document.getElementById('confirm-password');
            if (isLogin) { confirmGroup.classList.add('hidden'); confirmInput.required = false; } else { confirmGroup.classList.remove('hidden'); confirmInput.required = true; }
        }
        document.getElementById('toggle-auth').addEventListener('click', toggleMode);

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const username = document.getElementById('username').value.trim(); const password = document.getElementById('password').value;
                if (!isLogin) {
                    const confirmPassword = document.getElementById('confirm-password').value;
                    if (password !== confirmPassword) { alert('兩次輸入的密碼不一樣喔！'); return; }
                    const res = await fetch('/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
                    if (res.ok) { alert('🎉 註冊成功！'); document.getElementById('auth-form').reset(); toggleMode(); } else { const data = await res.json(); alert(`註冊失敗 ❌\n原因：${data.detail}`); }
                } else {
                    const formData = new URLSearchParams(); formData.append('username', username); formData.append('password', password);
                    const res = await fetch('/token', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: formData });
                    if (res.ok) { const data = await res.json(); localStorage.setItem('token', data.access_token); token = data.access_token; showMain(); fetchMemories(); fetchRoomInfo(); } else { alert('登入失敗 ❌\n帳號或密碼錯誤。'); }
                }
            } catch (error) { alert(`系統錯誤：${error.message}`); }
        });

        // --- 【新增】儀表板邏輯 ---
        async function fetchRoomInfo() {
            const res = await fetch('/room_info', { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) {
                const data = await res.json();
                roomStartDate = data.start_date;
                roomMeetupCount = data.meetup_count;
                
                // 渲染見面次數
                document.getElementById('meetup-count').innerText = roomMeetupCount;
                
                // 計算天數
                const daysElem = document.getElementById('days-count');
                if (!roomStartDate) {
                    daysElem.innerText = "0";
                    daysElem.classList.add('text-lg', 'text-pink-300'); // 提示去設定
                    daysElem.innerText = "點右上角設定";
                } else {
                    daysElem.classList.remove('text-lg', 'text-pink-300');
                    const start = new Date(roomStartDate);
                    const now = new Date();
                    start.setHours(0,0,0,0); now.setHours(0,0,0,0);
                    const diffTime = now - start;
                    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                    daysElem.innerText = diffDays >= 0 ? diffDays : 0; // 避免設定未來日期出現負數
                }
            }
        }

        async function saveRoomInfo(startDate, meetupCount) {
            const res = await fetch('/room_info', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ start_date: startDate || null, meetup_count: meetupCount })
            });
            if (res.ok) { fetchRoomInfo(); }
        }

        function addMeetup() {
            // 一鍵 +1
            saveRoomInfo(roomStartDate, roomMeetupCount + 1);
        }

        function openRoomSettings() {
            document.getElementById('setting-start-date').value = roomStartDate || '';
            document.getElementById('setting-meetup-count').value = roomMeetupCount;
            const modal = document.getElementById('room-settings-modal');
            const content = document.getElementById('room-settings-modal-content');
            modal.classList.remove('hidden'); setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
        }

        function closeRoomSettings() {
            const modal = document.getElementById('room-settings-modal');
            const content = document.getElementById('room-settings-modal-content');
            modal.classList.add('opacity-0'); content.classList.add('scale-95'); setTimeout(() => modal.classList.add('hidden'), 300);
        }

        document.getElementById('room-settings-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const newDate = document.getElementById('setting-start-date').value;
            const newCount = parseInt(document.getElementById('setting-meetup-count').value) || 0;
            saveRoomInfo(newDate, newCount);
            closeRoomSettings();
        });

        // --- 紀錄增刪改查 ---
        document.getElementById('memory-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const date = document.getElementById('mem-date').value; const content = document.getElementById('mem-content').value;
            const res = await fetch('/memories', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ date, content }) });
            if (res.ok) { document.getElementById('mem-content').value = ''; fetchMemories(); }
        });

        async function fetchMemories() {
            const res = await fetch('/memories', { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) {
                currentMemories = await res.json();
                const timeline = document.getElementById('timeline'); timeline.innerHTML = '';
                if(currentMemories.length === 0) { timeline.innerHTML = '<p class="text-gray-400 text-center mt-10 text-sm pl-4"><i class="fa-solid fa-seedling mr-2"></i>目前空間還空空的，寫下第一筆紀錄吧！</p>'; return; }
                currentMemories.forEach((mem, index) => {
                    const div = document.createElement('div'); div.className = `relative pl-8 sm:pl-10 fade-in`; div.style.animationDelay = `${index * 0.05}s`;
                    div.innerHTML = `
                        <div class="absolute -left-[9px] top-1.5 w-4 h-4 rounded-full bg-pink-400 border-2 border-white shadow-sm ring-4 ring-pink-50"></div>
                        <div class="glass-card p-5 rounded-2xl shadow-sm hover:shadow-lg transition-all group relative">
                            <div class="flex justify-between items-center border-b border-pink-100/50 pb-3 mb-3">
                                <div><span class="text-sm font-bold text-pink-600"><i class="fa-regular fa-calendar-days mr-1.5 opacity-70"></i>${mem.date}</span><span class="text-xs bg-white text-pink-600 py-1 px-3 rounded-full shadow-sm border border-pink-100 font-medium ml-2">${mem.author}</span></div>
                                <button onclick="openEditModal(${index})" class="text-pink-300 hover:text-pink-500 transition-colors p-1" title="修改這篇"><i class="fa-solid fa-pen"></i></button>
                            </div>
                            <p class="text-gray-700 whitespace-pre-wrap leading-relaxed">${mem.content}</p>
                        </div>
                    `;
                    timeline.appendChild(div);
                });
            } else if (res.status === 401) { logout(); }
        }

        function openEditModal(index) {
            const mem = currentMemories[index]; editingMemoryId = mem.id; 
            document.getElementById('edit-mem-date').value = mem.date; document.getElementById('edit-mem-content').value = mem.content;
            const modal = document.getElementById('edit-modal'); const content = document.getElementById('edit-modal-content');
            modal.classList.remove('hidden'); setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
        }
        function closeEditModal() {
            const modal = document.getElementById('edit-modal'); const content = document.getElementById('edit-modal-content');
            modal.classList.add('opacity-0'); content.classList.add('scale-95'); setTimeout(() => modal.classList.add('hidden'), 300);
        }
        document.getElementById('edit-memory-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const date = document.getElementById('edit-mem-date').value; const content = document.getElementById('edit-mem-content').value;
            const res = await fetch(`/memories/${editingMemoryId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ date, content }) });
            if (res.ok) { closeEditModal(); fetchMemories(); } else { alert("修改失敗！"); }
        });

        // --- 綁定邏輯 ---
        function openLinkModal() { const modal = document.getElementById('link-modal'); const content = document.getElementById('link-modal-content'); modal.classList.remove('hidden'); setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10); document.getElementById('my-link-code').innerText = "------"; document.getElementById('partner-code').value = ""; }
        function closeLinkModal() { const modal = document.getElementById('link-modal'); const content = document.getElementById('link-modal-content'); modal.classList.add('opacity-0'); content.classList.add('scale-95'); setTimeout(() => modal.classList.add('hidden'), 300); }
        async function generateLinkCode() { const res = await fetch('/generate_link', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } }); if(res.ok) { const data = await res.json(); document.getElementById('my-link-code').innerText = data.link_code; } }
        async function joinLinkCode() {
            const code = document.getElementById('partner-code').value.trim(); if(!code) return alert("請輸入對方的代碼！");
            const res = await fetch('/join_link', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ code: code.toUpperCase() }) });
            if(res.ok) { alert("綁定成功！"); closeLinkModal(); fetchMemories(); fetchRoomInfo(); } else { const data = await res.json(); alert(data.detail); }
        }

        function showMain() { document.getElementById('auth-section').classList.add('hidden'); document.getElementById('main-section').classList.remove('hidden'); document.getElementById('mem-date').valueAsDate = new Date(); }
        function logout() { localStorage.removeItem('token'); token = null; currentMemories = []; document.getElementById('auth-section').classList.remove('hidden'); document.getElementById('main-section').classList.add('hidden'); document.getElementById('auth-form').reset(); }
    </script>
</body>
</html>
